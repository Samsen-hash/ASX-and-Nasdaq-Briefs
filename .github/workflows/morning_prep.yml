name: Morning Prep Dashboard
on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * 1-5'  # 7:30am Sydney AEST, weekdays
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python morning_prep.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: morning-prep-dashboard
          path: output/*.html
